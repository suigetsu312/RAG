name: rag-stack

services:
  vllm:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.vllm

    container_name: rag-vllm

    gpus: all
    ipc: host

    volumes:
      - "${MODEL_PATH:?MODEL_PATH is required}:/models/llm:ro"

    ports:
      - "127.0.0.1:${VLLM_PORT:-8000}:8000"

    command:
      - /models/llm
      - --served-model-name
      - qwen3-4b-awq
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --dtype
      - auto
      - --max-model-len
      - "4096"
      - --gpu-memory-utilization
      - "0.72"

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/health", timeout=5)
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 600s
      start_interval: 10s


    restart: unless-stopped

  rag-service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.rag

    container_name: rag-service

    gpus: all

    depends_on:
      vllm:
        condition: service_started

    ports:
      - "127.0.0.1:${RAG_PORT:-8080}:8080"

    environment:
      LLM_BACKEND: vllm
      VLLM_BASE_URL: http://vllm:8000/v1
      VLLM_MODEL: qwen3-4b-awq
      VLLM_TIMEOUT_SEC: "120"

      EMBEDDING_BACKEND: local
      EMBEDDING_MODEL: BAAI/bge-m3
      EMBEDDING_DEVICE: cuda
      EMBEDDING_BATCH_SIZE: "32"

      RAG_DOCUMENTS_DIR: /app/data/documents
      RAG_INDEX_DIR: /app/data/index

      HF_HOME: /root/.cache/huggingface
      PYTHONUNBUFFERED: "1"

    volumes:
      - ./data/documents:/app/data/documents
      - rag_index:/app/data/index
      - huggingface_cache:/root/.cache/huggingface

    restart: unless-stopped

volumes:
  rag_index:
  huggingface_cache: